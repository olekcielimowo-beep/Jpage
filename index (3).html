<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dla Ciebie ❤️</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4, #fad0c4, #a18cd1);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      color: #333;
    }

    .container {
      text-align: center;
      max-width: 620px;
      padding: 40px 20px;
      background: rgba(255,255,255,0.95);
      border-radius: 30px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
      position: relative;
      z-index: 2;
    }

    .photo {
      width: 100%;
      max-width: 500px;
      border-radius: 20px;
      margin: 20px 0;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    h1 {
      font-size: 2.8rem;
      margin-bottom: 15px;
      color: #e91e63;
    }

    p {
      font-size: 1.35rem;
      margin: 18px 0;
      line-height: 1.6;
    }

    .hearts {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: hidden;
      z-index: 1;
    }

    .heart {
      position: absolute;
      font-size: 2rem;
      color: #ff4081;
      animation: float 8s linear infinite;
      opacity: 0.8;
    }

    @keyframes float {
      0% { transform: translateY(100vh) rotate(0deg); }
      100% { transform: translateY(-100vh) rotate(360deg); }
    }

    button {
      margin-top: 30px;
      padding: 15px 40px;
      font-size: 1.3rem;
      background: #e91e63;
      color: white;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 10px 20px rgba(233, 30, 99, 0.4);
      transition: all 0.3s;
    }

    button:hover {
      transform: scale(1.1);
      background: #c2185b;
    }

    .yes-btn {
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }

    .message {
      margin-top: 30px;
      font-size: 1.5rem;
      color: #e91e63;
      display: none;
    }
  </style>
</head>
<body>

  <div class="hearts" id="hearts"></div>

  <div class="container">
    <h1>Hej Jagoda ❤️</h1>
    
    <img src="image.png" alt="Olek i Jagoda" class="photo">

    <p>Cześć Jagoda! Zrobiłem tę stronę specjalnie dla Ciebie, bo jestem totalnym nerdem i chciałem Ci pokazać, jak bardzo mi na Tobie zależy, Olek.</p>
    <p>Chcesz iść ze mną na randkę?</p>
    
    <button class="yes-btn" onclick="acceptDate()">TAK, bardzo chcę! 💕</button>
    
    <div class="message" id="message">
      <p>Yayyy! 🥰 Zrobię zakupy i ugotuję pyszną kolację.</p>
      <p>Nie mogę się doczekać!</p>
    </div>
  </div>

  <script>
    function createHeart() {
      const heart = document.createElement('div');
      heart.classList.add('heart');
      heart.textContent = ['❤️', '💖', '💗', '💘', '💝'][Math.floor(Math.random()*5)];
      
      heart.style.left = Math.random() * 100 + 'vw';
      heart.style.animationDuration = (Math.random() * 6 + 7) + 's';
      heart.style.fontSize = (Math.random() * 1.5 + 1.8) + 'rem';
      heart.style.opacity = Math.random() * 0.6 + 0.5;
      
      document.getElementById('hearts').appendChild(heart);

      setTimeout(() => heart.remove(), 16000);
    }

    setInterval(createHeart, 280);

    function acceptDate() {
      document.getElementById('message').style.display = 'block';
      document.querySelector('button').style.display = 'none';
      
      for(let i = 0; i < 35; i++) {
        setTimeout(createHeart, i * 60);
      }
    }

    // Start hearts
    for(let i = 0; i < 12; i++) {
      createHeart();
    }
  </script>
</body>
</html>
